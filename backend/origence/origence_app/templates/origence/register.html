{% extends 'layouts/app.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-sm-6">
        <h2 class="text-muted">Register</h2>
        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}

            <div class="form-group">
                <label>Username:</label>
                <input type="text" name="username" class="form-control" value="{{ username|default:'' }}" />
                <span class="text-danger">{{ errors.username }}</span>
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" class="form-control" />
                <span class="text-danger">{{ errors.password }}</span>
            </div>

            <div class="form-group">
                <label>Confirm Password:</label>
                <input type="password" name="confirm" class="form-control" />
                <span class="text-danger">{{ errors.confirm }}</span>
            </div>

            <button type="submit" class="btn btn-dark">Submit</button>
            <a href="{% url 'login' %}" class="btn btn-secondary">Already a user? Login here</a>
        </form>
    </div>
</div>

{% endblock %}
